<!DOCTYPE html>
<html>
<head>
  <title>Insta Clone</title>
  <style>
    body{font-family:sans-serif;background:#fafafa;margin:0}
    .header{display:flex;justify-content:space-between;align-items:center;padding:10px 20px;background:#fff;border-bottom:1px solid #ddd}
    .logo{font-weight:bold;font-size:20px;color:#e1306c}
    .feed{max-width:400px;margin:20px auto;background:#fff;border:1px solid #ddd;border-radius:10px;overflow:hidden}
    .user{display:flex;align-items:center;padding:10px}
    .avatar{width:40px;height:40px;border-radius:50%;background:#fcb045;margin-right:10px}
    .photo{width:100%;height:300px;background:#ddd}
    .actions{display:flex;gap:10px;padding:10px;font-size:20px}
    .likes,.caption{padding:0 10px 10px;font-size:14px}
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Insta</div>
    <div>❤ ✉ ⚙</div>
  </div>
  <div class="feed">
    <div class="user"><div class="avatar"></div><b>user_name</b></div>
    <div class="photo"></div>
    <div class="actions">❤ 💬 ↗</div>
    <div class="likes">123 likes</div>
    <div class="caption"><b>user_name</b> Beautiful day!</div>
  </div>
</body>
</html>
